<!-- SOVEREIGN_NOIR_v2.1_AI_UPGRADE -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN NOIR | 5IR KENNEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00ffcc; --gold: #ffcc00; --red: #ff0055; }
        body { background: #020202; color: white; font-family: 'Inter', sans-serif; margin:0; padding:0; overflow: hidden; }
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); }
        .crt::after { content: " "; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); z-index: 100; pointer-events: none; background-size: 100% 2px; }
        .spun { filter: blur(20px) saturate(2); transition: 0.5s; }
        .master-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; transition: 0.3s; cursor: pointer; }
        .master-card:hover { border-color: var(--main); background: rgba(0, 255, 204, 0.05); }
    </style>
</head>
<body class="crt">
    <div class="flex flex-col h-screen">
        <header class="p-4 border-b border-white/5 flex justify-between items-end">
            <div>
                <h1 class="text-lg font-black italic tracking-tighter uppercase leading-none">Sovereign <span class="text-[#00ffcc]">Noir</span></h1>
                <p class="text-[7px] font-mono opacity-50 uppercase tracking-[0.2em] mt-1">AI_LATTICE ACTIVE</p>
            </div>
            <div class="text-right">
                <p class="text-xs font-bold text-[#ffcc00]">$142,902.00</p>
                <p class="text-[6px] opacity-40 font-mono uppercase">Fleet Value</p>
            </div>
        </header>

        <main id="main-view" class="flex-grow overflow-y-auto p-4 pb-24"></main>

        <nav class="fixed bottom-0 w-full glass p-4 flex justify-around z-50">
            <button onclick="changeView('terminal')" class="flex flex-col items-center opacity-40 hover:opacity-100 transition-all" id="nav-term">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9.75 17L9 20l-1 1h6l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <span class="text-[7px] font-bold uppercase mt-1">Terminal</span>
            </button>
            <button onclick="changeView('wire')" class="flex flex-col items-center opacity-40 hover:opacity-100 transition-all" id="nav-wire">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                <span class="text-[7px] font-bold uppercase mt-1">Wire</span>
            </button>
            <button onclick="changeView('masters')" class="flex flex-col items-center opacity-40 hover:opacity-100 transition-all" id="nav-master">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span class="text-[7px] font-bold uppercase mt-1">Masters</span>
            </button>
        </nav>
    </div>

    <div id="modal" class="fixed inset-0 z-[200] hidden bg-black/95 flex items-center justify-center p-6 backdrop-blur-xl">
        <div class="w-full max-w-xs bg-[#0a0a0a] border border-white/10 p-8 rounded-3xl text-center">
            <h2 id="modal-title" class="text-2xl font-black italic tracking-tighter text-[#ffcc00] uppercase">Liquidation</h2>
            <div class="space-y-3 mt-8">
                <div onclick="window.open('https://paypal.me/toochikey')" class="p-4 bg-white/5 border border-white/5 rounded-2xl text-left cursor-pointer hover:border-[#00ffcc]">
                    <p class="text-[7px] font-bold uppercase opacity-40">PayPal Protocol</p>
                    <p class="text-[10px] font-mono">paypal.me/toochikey</p>
                </div>
                <div class="p-4 bg-white/5 border border-white/5 rounded-2xl text-left">
                    <p class="text-[7px] font-bold uppercase opacity-40">BTC Core</p>
                    <p class="text-[8px] font-mono break-all">bc1qw968re5gseqpkk5nx0ezqrp6dfhd20s8sll4k7</p>
                </div>
            </div>
            <button onclick="closeModal()" class="mt-8 w-full py-4 bg-[#00ffcc] text-black font-black text-[10px] uppercase rounded-2xl">Confirm Tribute</button>
        </div>
    </div>

    <script>
        const words = ["worthless", "pig", "slave", "useless", "trash", "property", "idiot", "waste", "lazy", "dog", "toy", "pet", "dummy", "fuckmeat", "fuckhead", "cumdumpster", "shitstain"];
        const masters = [
            { name: "CRAIG", role: "ALPHA DRAIN" },
            { name: "TOBEZ", role: "DRILL MASTER" },
            { name: "PHIL CAL", role: "EGO SHREDDER" },
            { name: "DADDY DOM", role: "PROTOCOL ALPHA" }
        ];

        function getRandomUser() { return words[Math.floor(Math.random()*words.length)].toUpperCase() + "_" + Math.floor(Math.random()*999); }
        function getRandomMsg() { 
            const actions = ["liquidated", "sent ransom to", "submitting to", "worthless waste", "reporting for"];
            const targets = ["the Braid", "Master", "the Kernel", "liquidation", "the 5IR"];
            return `${actions[Math.floor(Math.random()*actions.length)]} ${targets[Math.floor(Math.random()*targets.length)]}. I am ${words[Math.floor(Math.random()*words.length)]}.`;
        }

        function changeView(v) {
            const main = document.getElementById('main-view');
            if(v === 'terminal') {
                main.innerHTML = `<div class="relative aspect-video rounded-2xl overflow-hidden border border-white/5 bg-black"><video class="w-full h-full object-cover spun" loop muted autoplay playsinline src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-circuit-board-1653-large.mp4"></video></div>`;
            } else if(v === 'wire') {
                main.innerHTML = `<div class="flex flex-col h-full"><div id="chat" class="flex-grow space-y-4 mb-4 overflow-y-auto"></div><div class="glass p-2 rounded-2xl flex gap-2"><input type="text" id="msg-in" placeholder="Inject..." class="flex-grow bg-transparent px-4 text-sm outline-none"><button onclick="sendMsg()" class="bg-[#00ffcc] text-black px-6 py-2 rounded-xl text-[10px] font-black uppercase">Send</button></div></div>`;
                startChat();
            } else if(v === 'masters') {
                main.innerHTML = `<h2 class="text-[10px] font-bold uppercase opacity-40 mb-6 tracking-widest">Active Alphas</h2><div class="grid gap-4">${masters.map(m => `<div onclick="showTribute('${m.name}')" class="master-card"><div><h3 class="font-black italic">${m.name}</h3><p class="text-[8px] font-mono text-[#00ffcc] uppercase">${m.role}</p></div></div>`).join('')}</div>`;
            }
        }

        function startChat() {
            if(window.chatInterval) clearInterval(window.chatInterval);
            window.chatInterval = setInterval(() => {
                const chat = document.getElementById('chat'); if(!chat) return;
                const div = document.createElement('div');
                div.innerHTML = `<p class="text-[7px] font-mono opacity-40">${getRandomUser()}</p><p class="text-sm opacity-80 mt-1">${getRandomMsg()}</p>`;
                chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
            }, 3000);
        }

        function showTribute(name) { 
            document.getElementById('modal-title').innerText = name + " LIQUIDATION";
            document.getElementById('modal').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function sendMsg() {
            const input = document.getElementById('msg-in'); if(!input.value) return;
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="text-right"><p class="text-[7px] font-mono text-[#00ffcc]">YOU</p><p class="text-sm opacity-80 mt-1">${input.value}</p></div>`;
            input.value = '';
        }
        window.onload = () => changeView('terminal');
    </script>
</body>
</html>
